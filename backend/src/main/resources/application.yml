spring:
  application:
    name: jeongsi-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: ${PORT:8080}
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

jeongsi:
  # 2027학년도 수능일(2026-11-19, KST) — D-day 계산 기준. 실제 발표일 확정 시 교체.
  suneung-date: ${SUNEUNG_DATE:2026-11-19}
  admission-year: ${ADMISSION_YEAR:2027}
