name: jeongsi

services:
  postgres:
    image: postgres:16-alpine
    container_name: jeongsi-postgres
    environment:
      POSTGRES_DB: jeongsi
      POSTGRES_USER: jeongsi
      POSTGRES_PASSWORD: jeongsi
    ports:
      - "5432:5432"
    volumes:
      - jeongsi-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jeongsi -d jeongsi"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  jeongsi-postgres-data:
